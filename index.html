<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MUSORICHO Wines &amp; Spirits POS</title>
  <link rel="preconnect" href="https://unpkg.com" crossorigin />
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
  <link rel="dns-prefetch" href="https://unpkg.com" />
  <link rel="dns-prefetch" href="https://www.gstatic.com" />
  <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAZAAAAFtCAYAAAApszwLAACkMElEQVR42u19d5gkVdX+W909s3kXNrK7hF3Ckpe0klRyUMkgKEEQwYwJ/VQ+1M8ABsxgABExgSACIjlHyTnnsAsb[...]
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>
  <div id="root"><div id="babel-loading">Loading MUSORICHO POS…</div></div>

  <!-- TEMPORARY DIAGNOSTIC OVERLAY — shows real errors on-screen for on-phone debugging.
       Safe to remove once the Firebase issue is found. -->
  <script>
    window.__showDiag = function(msg) {
      var el = document.getElementById('__diagBox');
      if (!el) {
        el = document.createElement('div');
        el.id = '__diagBox';
        el.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:999999;background:#B23A48;color:#fff;padding:14px;font:12px monospace;white-space:pre-wrap;max-height:50vh;overflow:auto;';
        document.body.appendChild(el);
      }
      el.textContent += (el.textContent ? '\n\n---\n\n' : '') + msg;
    };
    window.addEventListener('error', function(e) {
      window.__showDiag('window error: ' + (e.message || e) + (e.filename ? ('\nat ' + e.filename + ':' + e.lineno) : ''));
    });
    window.addEventListener('unhandledrejection', function(e) {
      window.__showDiag('unhandled promise rejection: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
    });
  </script>

  <!-- Firebase: cross-device sync (Firestore) + Google Sign-In (Auth)
       Placed first (and the bundles below marked `defer`) so its download starts
       immediately in parallel, instead of queuing behind ~3MB of React/Recharts/Babel
       on slow connections. -->
  <script type="module">
    try {
    import("https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js").then(async ({ initializeApp }) => {
    const { getFirestore, doc, setDoc, onSnapshot, serverTimestamp } = await import("https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js");
    const { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, updateP[...]

    const firebaseConfig = {
      apiKey: "AIzaSyB55Q1sYL3KqfvHyj-1ILAXxfNXT1eWqkM",
      authDomain: "musoricho-pos.firebaseapp.com",
      projectId: "musoricho-pos",
      storageBucket: "musoricho-pos.firebasestorage.app",
      messagingSenderId: "706674514435",
      appId: "1:706674514435:web:c1b3e0d971f71dd6afcc36",
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getFirestore(firebaseApp);
    const auth = getAuth(firebaseApp);
    const googleProvider = new GoogleAuthProvider();

    window.__musorichoDb = db;
    window.__musorichoSetDoc = (key, json) => {
      setDoc(doc(db, "musoricho", key), { json, updatedAt: serverTimestamp() })
        .catch(err => console.error("MUSORICHO cloud sync — write failed:", err));
    };
    window.__musorichoOnSnapshot = (key, callback) => {
      return onSnapshot(doc(db, "musoricho", key), (snap) => {
        callback(snap.exists() && typeof snap.data().json === "string" ? snap.data().json : null);
      }, (err) => { console.error("MUSORICHO cloud sync — listen failed:", err); callback(null); });
    };

    window.__musorichoSignIn = () => signInWithRedirect(auth, googleProvider);
    // after returning from Google, check whether the redirect sign-in succeeded or failed
    getRedirectResult(auth).catch(err => {
      window.__showDiag('getRedirectResult error: ' + err.code + ' — ' + err.message);
      window.dispatchEvent(new CustomEvent("musoricho-auth-error", { detail: { code: err.code, message: err.message } }));
    });
    window.__musorichoEmailSignIn = (email, password) => signInWithEmailAndPassword(auth, email, password)
      .then(result => ({ email: result.user.email, name: result.user.displayName, photo: result.user.photoURL, uid: result.user.uid }));
    window.__musorichoEmailSignUp = (email, password, name) => createUserWithEmailAndPassword(auth, email, password)
      .then(async (result) => {
        if (name) { try { await updateProfile(result.user, { displayName: name }); } catch (e) { /* non-fatal */ } }
        return { email: result.user.email, name: name || result.user.email, photo: result.user.photoURL, uid: result.user.uid };
      });
    window.__musorichoSendPasswordReset = (email) => sendPasswordResetEmail(auth, email);
    window.__musorichoSignOut = () => signOut(auth);
    window.__musorichoOnAuthChange = (callback) => onAuthStateChanged(auth, (user) => {
      callback(user ? { email: user.email, name: user.displayName, photo: user.photoURL, uid: user.uid } : null);
    });

    window.__showDiag('Firebase initialized OK — dispatching ready event.');
    window.dispatchEvent(new CustomEvent("musoricho-firebase-ready"));
    }).catch(err => {
      window.__showDiag('Firebase import/init FAILED: ' + (err && err.message ? err.message : err));
    });
    } catch (err) {
      window.__showDiag('Firebase module top-level error: ' + (err && err.message ? err.message : err));
    }
  </script>

  <!-- React -->
  <script defer crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script defer crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Charts -->
  <script defer crossorigin src="https://unpkg.com/prop-types@15/prop-types.js"></script>
  <script defer crossorigin src="https://unpkg.com/recharts@2/umd/Recharts.js"></script>

  <!-- In-browser JSX compiler (no build step required) -->
  <script defer crossorigin src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

  <script type="text/babel" src="app.js?v=19"></script>
</body>
</html>
